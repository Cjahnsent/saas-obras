<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Obras - Acceso Privado</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans min-h-screen flex flex-col items-center justify-center p-8">

    <div id="login-view" class="bg-white p-8 rounded-lg shadow-lg max-w-sm w-full border border-slate-200">
        <h2 class="text-2xl font-bold mb-6 text-center text-slate-800">SaaS Constructora</h2>
        
        <label class="block text-sm font-bold text-slate-600 mb-1">Usuario</label>
        <input type="text" id="username" class="mb-4 w-full border rounded p-2" placeholder="Ej: admin">
        
        <label class="block text-sm font-bold text-slate-600 mb-1">Contraseña</label>
        <input type="password" id="password" class="mb-6 w-full border rounded p-2" placeholder="••••">
        
        <button onclick="iniciarSesion()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-2 rounded transition">
            Ingresar al Sistema
        </button>
    </div>

    <div id="dashboard-view" class="hidden w-full max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="bg-white p-6 rounded-lg shadow-lg border border-slate-200 lg:col-span-1">
            <h2 class="text-xl font-bold mb-4 text-slate-800">1. Ingresar Reporte</h2>
            
            <label class="text-sm font-bold text-slate-600">Capataz:</label>
            <input type="text" id="capataz" class="mb-3 w-full border rounded p-2" value="Luis Torres">
            
            <label class="text-sm font-bold text-slate-600">ID de la Obra:</label>
            <input type="text" id="obra" class="mb-3 w-full border rounded p-2" value="Torre Sur">
            
            <label class="text-sm font-bold text-slate-600">Mensaje:</label>
            <textarea id="texto" rows="4" class="mb-3 w-full border rounded p-2" placeholder="Ej: Jefe, hoy al echar el cemento..."></textarea>
            
            <button onclick="guardarReporte()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded">
                Guardar en Bóveda Segura
            </button>
            
            <button onclick="cerrarSesion()" class="mt-4 w-full bg-red-100 hover:bg-red-200 text-red-700 font-bold py-2 rounded text-sm">
                Cerrar Sesión
            </button>
        </div>

        <div class="bg-slate-900 text-white p-6 rounded-lg shadow-lg lg:col-span-2">
            <h2 class="text-xl font-bold mb-4 text-blue-300 border-b border-slate-700 pb-2">2. Historial de tu Empresa</h2>
            <div id="historial" class="space-y-4">
                <p class="text-slate-500 italic text-center">Cargando datos seguros...</p>
            </div>
        </div>
    </div>

    <script>
        let usuarioActualId = null; // Memoria temporal para saber quién está conectado

        // 1. Lógica del Login
        async function iniciarSesion() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            const respuesta = await fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: user, password: pass })
            });
            const datos = await respuesta.json();

            if (datos.success) {
                usuarioActualId = datos.usuario_id;
                // Cambiamos las pantallas
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('dashboard-view').classList.remove('hidden');
                // Removemos clases que centran el login para que el dashboard ocupe toda la pantalla arriba
                document.body.classList.remove('items-center', 'justify-center'); 
                
                cargarHistorial(); // Cargamos solo los datos de este usuario
            } else {
                alert(datos.mensaje); // "Usuario o clave incorrecta"
            }
        }

        // 2. Guardar un reporte
        async function guardarReporte() {
            const datos = {
                usuario_id: usuarioActualId, // ¡Enviamos la credencial del usuario!
                nombre_capataz: document.getElementById('capataz').value,
                obra_id: document.getElementById('obra').value,
                texto: document.getElementById('texto').value
            };

            if(!datos.texto) return alert("Escribe un mensaje primero.");

            await fetch("/procesar-reporte", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(datos)
            });
            
            document.getElementById('texto').value = ""; 
            cargarHistorial(); 
        }

        // 3. Cargar el historial personalizado
        async function cargarHistorial() {
            const respuesta = await fetch(`/historial/${usuarioActualId}`); // Pedimos la ruta con nuestro ID
            const reportes = await respuesta.json();
            
            const contenedor = document.getElementById('historial');
            contenedor.innerHTML = ""; 
            
            if (reportes.length === 0) {
                contenedor.innerHTML = "<p class='text-slate-500 text-center'>Tu empresa no tiene reportes guardados todavía.</p>";
                return;
            }

            reportes.forEach(rep => {
                const color = rep.riesgo ? "border-red-500 bg-red-900/40" : "border-green-500 bg-slate-800";
                const icono = rep.riesgo ? "🔴 PELIGRO" : "✅ OK";
                
                contenedor.innerHTML += `
                    <div class="p-3 rounded border-l-4 ${color}">
                        <div class="flex justify-between font-bold mb-1">
                            <span class="text-lg text-white">${rep.obra}</span>
                            <span class="text-sm">${icono}</span>
                        </div>
                        <p class="text-xs text-slate-400 mb-2">${rep.fecha} | Por: ${rep.capataz}</p>
                        <p class="text-sm text-slate-200 capitalize">${rep.hitos}</p>
                    </div>
                `;
            });
        }

        // 4. Salir
        function cerrarSesion() {
            usuarioActualId = null;
            document.getElementById('username').value = "";
            document.getElementById('password').value = "";
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('login-view').classList.remove('hidden');
            document.body.classList.add('items-center', 'justify-center');
        }
    </script>
</body>
</html>
